<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slowed + Reverb</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(20, 20, 30, 0.85);
      --text: #e0e0e0;
      --accent: #7c3aed;
      --border: rgba(124, 58, 237, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display:flex; justify-content:center; align-items:center; padding:20px; overflow-x:hidden; }
    .ascii-bg { position: fixed; inset: 0; width:100%; height:100%; z-index:0; opacity:.45; pointer-events:none; }
    .container { position:relative; z-index:1; width:100%; max-width:520px; background:var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border:1px solid var(--border); border-radius:20px; padding:32px; box-shadow:0 20px 60px rgba(0,0,0,.6), 0 0 40px rgba(124,58,237,.1); }
    h1 { text-align:center; font-weight:300; letter-spacing:6px; margin-bottom:24px; font-size:1.4rem; text-transform:uppercase; }
    .drop-zone { border:2px dashed var(--border); border-radius:14px; padding:36px; text-align:center; cursor:pointer; }
    .drop-zone input { display:none; }
    #visualizer { width:100%; margin-top:24px; border-radius:10px; background:rgba(0,0,0,.4); border:1px solid rgba(124,58,237,.15); }
  </style>
</head>
<body>
  <canvas id="asciiBg" class="ascii-bg"></canvas>

  <div class="container">
    <h1>Slowed + Reverb</h1>

    <div class="drop-zone" id="dropZone">
      <p>▼ 오디오 파일을 드래그하거나 클릭하여 업로드</p>
      <input type="file" id="fileInput" accept="audio/*">
    </div>

    <div class="controls" id="controls" style="display:none;">
      <div class="control-row">
        <label for="speedSlider">속도 (Speed)</label>
        <input type="range" id="speedSlider" min="0.25" max="1.0" step="0.01" value="0.85">
        <span id="speedValue">0.85x</span>
      </div>

      <div class="control-row">
        <label for="reverbSlider">리버브 (Reverb)</label>
        <input type="range" id="reverbSlider" min="0" max="1" step="0.01" value="0.5">
        <span id="reverbValue">50%</span>
      </div>

      <div class="control-row">
        <label for="bitrateSelect">MP3 품질</label>
        <select id="bitrateSelect">
          <option value="192">192 kbps</option>
          <option value="256">256 kbps</option>
          <option value="320" selected>320 kbps</option>
        </select>
      </div>

      <div class="buttons">
        <button id="playBtn">▶ 미리듣기</button>
        <button id="downloadBtn">▼ 다운로드 (MP3)</button>
      </div>
    </div>

    <canvas id="visualizer" width="600" height="120"></canvas>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
